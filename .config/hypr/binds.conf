# Set programs that you use
$terminal = kitty
$menu = fuzzel
$scrToDir = grim -g "$(slurp)" $HOME/media/screenshots/$(date +'screenshot_%Y-%m-%d-%H%M%S.png') && notify-send -t 2000 "Screenshot Saved"
$scrToClip = grim -g "$(slurp)" - | wl-copy && notify-send -t 2000 "Screenshot Copied"

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, k, killactive,
bind = $mainMod, m, exec, $menu
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod CTRL, F, togglefloating,
bind = $mainMod CTRL, R, pseudo, # dwindle
bind = $mainMod CTRL, o, togglesplit, # dwindle
bind = ,Print, exec, $scrToClip
bind = CTRL, Print, exec, $scrToDir

# Clipboard history
bind = $mainMod, V, exec, cliphist list | fuzzel --dmenu --with-nth 2 | cliphist decode | wl-copy

bind = $mainMod, b, fullscreen, 1
bind = $mainMod SHIFT, b, fullscreen, 0

# Move focus with mainMod + vim movements
bind = $mainMod SHIFT, H, movefocus, l
bind = $mainMod SHIFT, L, movefocus, r
bind = $mainMod SHIFT, K, movefocus, u
bind = $mainMod SHIFT, J, movefocus, d

# Move windows with mainMod + SHIFT + vim movements
bind = $mainMod CTRL, H, movewindow, l
bind = $mainMod CTRL, L, movewindow, r
bind = $mainMod CTRL, K, movewindow, u
bind = $mainMod CTRL, J, movewindow, d

# Resize windows with mainMod + CTRL + vim movements
bind = $mainMod CTRL SHIFT, H, resizeactive, -50 0
bind = $mainMod CTRL SHIFT, L, resizeactive, 50 0
bind = $mainMod CTRL SHIFT, K, resizeactive, 0 -50
bind = $mainMod CTRL SHIFT, J, resizeactive, 0 50

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, a, workspace, 1
bind = $mainMod, t, workspace, 2
bind = $mainMod, slash, workspace, 3
bind = $mainMod, l, workspace, 4
bind = $mainMod, n, workspace, 5
bind = $mainMod, j, workspace, 6
bind = $mainMod, f, workspace, 7
bind = $mainMod, p, workspace, 8
bind = $mainMod, h, workspace, 9
bind = $mainMod, d, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, a, movetoworkspace, 1
bind = $mainMod SHIFT, t, movetoworkspace, 2
bind = $mainMod SHIFT, slash, movetoworkspace, 3
bind = $mainMod SHIFT, l, movetoworkspace, 4
bind = $mainMod SHIFT, n, movetoworkspace, 5
bind = $mainMod SHIFT, j, movetoworkspace, 6
bind = $mainMod SHIFT, f, movetoworkspace, 7
bind = $mainMod SHIFT, p, movetoworkspace, 8
bind = $mainMod SHIFT, h, movetoworkspace, 9
bind = $mainMod SHIFT, d, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with ALT + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
