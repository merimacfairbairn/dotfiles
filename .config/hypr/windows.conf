# Always maximize feh
windowrulev2 = maximize,class:^(feh)$

# See https://wiki.hyprland.org/Configuring/Variables/ for more
misc {
    force_default_wallpaper = -1 # Set to 0 to disable the anime mascot wallpapers
}

# See https://wiki.hyprland.org/Configuring/Variables/ for more
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 4
    col.active_border = rgba(98971aee) rgba(d79921ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

# See https://wiki.hyprland.org/Configuring/Variables/ for more
decoration {
    rounding = 16

    blur {
        enabled = true
        size = 2
        passes = 2
    }
}

decoration:shadow {
    enabled = true
    color = rgba(1a1a1aee)
    range = 4
    render_power = 3
}

# Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
animations {
    enabled = yes

    bezier = myBezier, 0, 0.87, 0.45, 0.99

    animation = windows, 1, 4, myBezier
    animation = windowsOut, 1, 4, default, popin 80%

    animation = layersIn, 1, 4, myBezier, fade
    animation = layersOut, 1, 2, myBezier, fade
    layerrule = animation slide bottom, launcher

    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default

    animation = fade, 1, 3, myBezier
    animation = workspaces, 1, 4, myBezier, slide

}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = slave
}

# No scaling
xwayland {
    force_zero_scaling = true
}
